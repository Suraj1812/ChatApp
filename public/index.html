<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Live Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-page">
      <aside class="panel auth animate__animated animate__fadeInUp" id="authPanel">
        <div class="brand-row">
          <span class="brand-pill"><i class="fa-solid fa-comments"></i> Live Chat</span>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login or register to continue.</p>

        <div class="tabs">
          <button id="tabRegister" class="tab active"><i class="fa-solid fa-user-plus"></i> Register</button>
          <button id="tabLogin" class="tab"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </div>

        <form id="registerForm" class="form">
          <label>First Name</label>
          <input id="regFirstName" maxlength="40" required />

          <label>Last Name</label>
          <input id="regLastName" maxlength="40" required />

          <label>Username</label>
          <input id="regUsername" maxlength="30" required />

          <label>Password</label>
          <div class="password-wrap">
            <input id="regPassword" type="password" minlength="8" maxlength="128" required />
            <button id="toggleRegPassword" type="button" class="secondary tiny icon-only">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>

          <label>Profile Image</label>
          <input id="regAvatar" type="file" accept="image/*" />
          <img id="regAvatarPreview" class="upload-preview hidden" alt="register avatar preview" />

          <button type="submit"><i class="fa-solid fa-circle-check"></i> Create Account</button>
        </form>

        <form id="loginForm" class="form hidden">
          <label>Username</label>
          <input id="loginUsername" maxlength="30" required />

          <label>Password</label>
          <div class="password-wrap">
            <input id="loginPassword" type="password" minlength="8" maxlength="128" required />
            <button id="toggleLoginPassword" type="button" class="secondary tiny icon-only">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>

          <button type="submit"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
        </form>

        <small id="authStatus"></small>
      </aside>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
