<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat | Live Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="chat-wa">
    <div class="app-grid">
      <aside class="panel sidebar animate__animated animate__fadeInLeft">
        <div class="sidebar-rail">
          <button id="railChatsBtn" class="rail-btn active"><i class="fa-solid fa-comment-dots"></i></button>
          <button id="railProfileBtn" class="rail-btn"><i class="fa-solid fa-gear"></i></button>
          <button id="logoutBtn" class="rail-btn rail-logout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="sidebar-main">
          <div class="sidebar-top">
            <h2>Chats</h2>
            <input id="searchInput" placeholder="Search or start a new chat" />
            <div id="searchResults" class="search-results"></div>
          </div>

          <section id="chatsSection" class="side-section">
            <div id="chatsList" class="side-list"></div>
          </section>
        </div>
      </aside>

      <main class="panel chat-main animate__animated animate__fadeInUp">
        <header class="chat-header">
          <div class="user-head">
            <img id="profilePreview" class="avatar" alt="avatar" />
            <div>
              <strong id="userTitle">Loading...</strong>
              <small id="status"></small>
            </div>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <div class="composer">
          <div class="wa-footer">
            <button id="attachBtn" class="wa-icon-btn" type="button" title="Attach file">
              <i class="fa-solid fa-plus"></i>
            </button>
            <input id="textInput" maxlength="2000" placeholder="Type a message" />
            <button id="sendBtn" class="wa-icon-btn action" type="button" title="Send message">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
            <input id="fileInput" class="hidden-file" type="file" accept="image/*,audio/*,video/*,.pdf,.doc,.docx,.gif" />
          </div>
          <div id="chatFilePreview" class="file-preview hidden"></div>
          <small id="fileMeta"></small>
        </div>
      </main>
    </div>

    <div id="profileModal" class="modal hidden">
      <div class="modal-card animate__animated animate__zoomIn">
        <h3><i class="fa-solid fa-user-pen"></i> Edit Profile</h3>
        <input id="profileFirstName" maxlength="40" placeholder="First name" />
        <input id="profileLastName" maxlength="40" placeholder="Last name" />
        <textarea id="profileBio" maxlength="220" rows="2" placeholder="Bio"></textarea>
        <input id="profileAvatar" type="file" accept="image/*" />
        <img id="profileAvatarPreview" class="upload-preview hidden" alt="profile avatar preview" />
        <div class="modal-actions">
          <button id="saveProfileBtn"><i class="fa-solid fa-floppy-disk"></i> Save</button>
          <button class="secondary" data-close="profileModal">Close</button>
        </div>
      </div>
    </div>

    <div id="userProfileModal" class="modal hidden">
      <div class="modal-card animate__animated animate__zoomIn">
        <h3><i class="fa-solid fa-id-badge"></i> Profile</h3>
        <div class="profile-view">
          <img id="viewProfileAvatar" class="avatar large" alt="profile" />
          <div>
            <strong id="viewProfileName">-</strong>
            <p id="viewProfileUsername">-</p>
            <p id="viewProfileBio">-</p>
          </div>
        </div>
        <div class="modal-actions">
          <button class="secondary" data-close="userProfileModal">Close</button>
        </div>
      </div>
    </div>

    <div id="logoutModal" class="modal hidden">
      <div class="modal-card animate__animated animate__zoomIn">
        <h3><i class="fa-solid fa-right-from-bracket"></i> Logout</h3>
        <p>Are you sure you want to logout?</p>
        <div class="modal-actions">
          <button id="confirmLogoutBtn" class="danger">Logout</button>
          <button class="secondary" data-close="logoutModal">Cancel</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js?v=20260305-3"></script>
  </body>
</html>
